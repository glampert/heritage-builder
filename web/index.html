<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heritage Builder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Loading screen overlay */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            color: #e0e0e0;
            z-index: 100;
            transition: opacity 0.4s ease;
        }

        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loading-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: #d4a574;
        }

        #loading-bar-container {
            width: 320px;
            height: 8px;
            background: #2a2a4a;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        #loading-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #d4a574, #e8c89e);
            border-radius: 4px;
            transition: width 0.15s ease;
        }

        #loading-status {
            font-size: 0.875rem;
            color: #8888aa;
        }

        #error-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            color: #e0e0e0;
            z-index: 200;
        }

        #error-screen.visible {
            display: flex;
        }

        #error-message {
            max-width: 600px;
            padding: 2rem;
            background: #2a2a4a;
            border-radius: 8px;
            border: 1px solid #ff6b6b;
        }

        #error-message h2 {
            color: #ff6b6b;
            margin-bottom: 1rem;
        }

        #error-message pre {
            font-size: 0.8rem;
            color: #aaa;
            overflow-x: auto;
            white-space: pre-wrap;
        }
    </style>
    <!-- Map bare "env" module specifier to our C stdlib shims for imgui-sys -->
    <script type="importmap">
    {
        "imports": {
            "env": "./libc.js"
        }
    }
    </script>
</head>
<body>
    <canvas id="game-canvas"></canvas>

    <div id="loading-screen">
        <div id="loading-title">Heritage Builder</div>
        <div id="loading-bar-container">
            <div id="loading-bar"></div>
        </div>
        <div id="loading-status">Initializing...</div>
    </div>

    <div id="error-screen">
        <div id="error-message">
            <h2>Failed to Start</h2>
            <pre id="error-details"></pre>
        </div>
    </div>

    <script type="module" src="bootstrap.js"></script>
</body>
</html>
